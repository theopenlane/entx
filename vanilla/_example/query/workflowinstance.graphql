query GetAllWorkflowInstances ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [WorkflowInstanceOrder!]) {
	workflowInstances(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				id
				status
			}
		}
	}
}
query GetWorkflowInstanceByID ($workflowInstanceId: ID!) {
	workflowInstance(id: $workflowInstanceId) {
		id
		status
	}
}
query GetWorkflowInstances ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [WorkflowInstanceOrder!], $where: WorkflowInstanceWhereInput) {
	workflowInstances(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				id
				status
			}
		}
	}
}
