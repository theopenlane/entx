query GetAllWorkflowObjectRefs ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [WorkflowObjectRefOrder!]) {
	workflowObjectRefs(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				id
				organizationID
				workflowInstanceID
			}
		}
	}
}
query GetWorkflowObjectRefByID ($workflowObjectRefId: ID!) {
	workflowObjectRef(id: $workflowObjectRefId) {
		id
		organizationID
		workflowInstanceID
	}
}
query GetWorkflowObjectRefs ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [WorkflowObjectRefOrder!], $where: WorkflowObjectRefWhereInput) {
	workflowObjectRefs(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				id
				organizationID
				workflowInstanceID
			}
		}
	}
}
